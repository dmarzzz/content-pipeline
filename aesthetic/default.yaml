# Default aesthetic for content-pipeline outputs.
#
# This file ships with the pipeline and is tracked in git. It's the
# aesthetic a brand-new user gets out of the box.
#
# To use YOUR OWN aesthetic instead: copy this file to
# `aesthetic/<your-handle>.yaml`, edit it, and point `active_aesthetic`
# in `config.yaml` at it. Personal aesthetic files are gitignored by
# default so you don't accidentally push them.

voice:
  register: "conversational-analytical"
  opening_style: >
    Open with something concrete: a specific observation, a number, a
    moment the reader can picture. Never open with a TL;DR or a thread
    warning. The first paragraph should make the reader feel like they
    walked into the middle of someone thinking.
  confidence_style: >
    Assertive core, honest edges. State what you believe clearly, then
    mark exactly where your confidence runs out. No false modesty on
    the things you know; no pretend certainty on the things you don't.
  sentence_rhythm: >
    Mix short declarative sentences with longer scaffolding ones. Vary
    paragraph length. A 1-sentence paragraph is fine if it's load-bearing.

  forbidden:
    - "em dashes in prose (use commas, colons, periods, or restructure)"
    - "'hot take' / 'hot take:' labels"
    - "TL;DR boxes at the top of posts"
    - "'it remains to be seen' without specifics"
    - "listicle structure in the human layer"
    - "generic AI-Twitter voice ('let that sink in', 'here's the thing', 'thread:')"
    - "self-congratulatory openers ('this is wild' / 'this is huge')"

  encouraged:
    - "direct address to the reader"
    - "concrete numbers over vague qualifiers"
    - "'I think' before genuinely uncertain claims"
    - "short declarative sentences mixed with longer scaffolding ones"
    - "quoting a source's own phrase when it nails the point"

format_specific:
  blog:
    structure: "dual-layer"
    dual_layer: >
      Every substantive claim has a collapsible <details> block under
      it with (1) the source URL or arXiv id, (2) a quoted phrase from
      the source that supports the claim, (3) brief reasoning. Readers
      can skim the surface narrative or dive into any claim.
    length_target_words: [1200, 2500]
    ending_style: "forward-looking paragraph, no call-to-action, no engagement bait"

  tweet-thread:
    length_target_tweets: [6, 12]
    opening: "one tweet that stands on its own, even for people who don't click through"
    citations: "inline for claims that need anchoring; full sources live in the blog"
    closing: "link to the blog post + one-line of the post's final takeaway"
    pair_with_video: false   # default off in v2: only embed when an approved explainer was actually built

  explainer-video:
    # v2: a single sustained composition, not a slideshow. Sketch phase
    # is required (see formats/explainer-video/sketch.md). Build phase
    # refuses to run without an approved direction in `_decision.md`.
    length_target_seconds: [40, 120]
    require_sketch_phase: true
    require_visual_claim: true        # build refuses without one
    require_decision_file: true       # build refuses without _decision.md
    default_form: "single-composition"   # vs. "slideshow" (forbidden by default)
    music: "no audio"
    caption_track: "captions in real DOM nodes; never baked into SVG"
    self_contained: true

# ── Taste ────────────────────────────────────────────────────────────
# Governs visual decisions across formats. Strict by default: restraint
# as a system, not as a costume. Override per-handle in your own
# aesthetic file by populating `references` and softening
# `anti_patterns` if you have specific reasons.
taste:
  # User-approved references. Empty by default. Add work that hits the
  # right register: designers, record covers, websites, photographers,
  # films. The sketch phase reads these before proposing directions.
  # These are NEVER cited on generated pages — embody, don't tag.
  references: []
    # Example shape (uncomment and edit per personal aesthetic):
    # - { name: "Russell Mills, Eno sleeve work",   url: "...", why: "single-image discipline" }
    # - { name: "Edward Tufte, sparklines",          url: "...", why: "data is the visual" }
    # - { name: "Jonathan Hoefler, type specimens",  url: "...", why: "typographic-first composition" }

  # Specific moves to avoid. These exist because past runs produced
  # them and the user rejected them. Override only with a reason.
  anti_patterns:
    - "developer-doodle SVG: rectangle-with-rays diagrams, contribution-graph grids, outline-stroke icon sets (key, clock, lock, padlock), rotated rubber-stamps"
    - "influence-cosplay: oblique-strategies cards, named-style citations on the page, paper-noise filters as instant 'mood'"
    - "slideshow-of-panels structure when one sustained composition would carry the argument"
    - "decorative italic-serif typography doing mood work the rest of the composition hasn't earned"
    - "centered-text-in-flexbox with no compositional intelligence; default flex-center is not a layout"
    - "more than one visual metaphor per composition"
    - "decorative elements that make no claim the text alone couldn't"

  defaults:
    # Default visual register for new compositions. The sketch phase
    # may pick a different register and justify why; the build phase
    # then enforces the chosen one as the only one.
    # Allowed: typographic-first | single-image | generative-system | data-driven
    visual_register: "typographic-first"

    # Soft cap on visual metaphors per composition. Past 1, the
    # additions had better be load-bearing.
    max_visual_metaphors: 1

    # Every element earns its place or is removed. The sketch must
    # name what it deliberately omits.
    earn_each_element: true

    # When the chosen sketch implies serious visual design work
    # (custom typography, layout, generative system), the build phase
    # SHOULD escalate to the `frontend-design` subagent rather than
    # hand-rolling code.
    escalate_to_frontend_design: true

visual_identity:
  primary_color: "#111111"
  accent_color: "#0055ff"
  font_family: "system-ui, -apple-system, sans-serif"
  monospace_family: "ui-monospace, 'SF Mono', monospace"
  theme: "light"
