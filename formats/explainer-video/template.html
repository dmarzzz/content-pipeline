<!--
  v2 template note. This file is intentionally minimal.

  The v1 shell shipped a slideshow-of-panels structure with default
  flex-centered text and a 100vh-per-section assumption. That
  structure pre-decided the form before any source was read, and
  pushed every output toward developer-doodle aesthetics.

  v2 ships almost nothing. Read `_decision.md` first; the chosen
  `form` field tells you the structural shape of the page:

    - typographic-first   → a single sustained reading. One column,
                            generous measure, very slow text reveals.
                            No diagrams. The composition is the type.

    - single-image        → a single composition that holds the
                            entire runtime. The "video" is one
                            still or one slow morph. No panels.

    - generative-system   → a system runs underneath; text floats
                            on top sparingly. The system is the
                            content. Honor reduced-motion.

    - data-driven         → the source contains numbers / a table
                            / a structured artifact; the page is
                            a careful presentation of that data,
                            not a sequence of generic charts.

  Build a composition from scratch in the chosen form. If you find
  yourself reaching for the v1 shell's `<section class="panel">`
  structure, you have probably picked the wrong form for the source.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>
    /* Replace with the composition's actual styles. The aesthetic's
       visual_identity (primary_color, accent_color, font_family,
       monospace_family) is a starting palette, not a destination. */
    :root {
      --fg: {{primary_color}};
      --accent: {{accent_color}};
      --font: {{font_family}};
      --mono: {{monospace_family}};
    }
    html, body { margin: 0; padding: 0; background: #fff; color: var(--fg); font-family: var(--font); }

    /* Reduced-motion support is a build-time requirement, not a
       polish step. Honor it on every animated element. */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <!--
      Build the composition here. ONE composition. Not a sequence of
      panels. The form chosen in _decision.md decides the structure;
      this template intentionally does not pre-decide it for you.
    -->
  </main>

  <script>
    // Inline only what the chosen form actually needs. No
    // IntersectionObserver-driven panel reveals by default — that's
    // a v1 pattern that nudges output toward slideshow form.
  </script>
</body>
</html>
